<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복산초등학교 4학년 3반 아침 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="season-spring">
  <canvas id="particles-canvas"></canvas>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-logo">
        <div class="school-emblem">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="emblemGrad" cx="50%" cy="40%" r="55%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
              </radialGradient>
            </defs>
            <circle cx="40" cy="40" r="38" fill="url(#emblemGrad)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
            <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
            <polygon points="40,16 43.5,29 57,29 46,37.5 50,51 40,43 30,51 34,37.5 23,29 36.5,29" fill="rgba(255,255,255,0.92)"/>
          </svg>
        </div>
        <div class="school-name-wrap">
          <div class="school-name-main">복산초등학교</div>
          <div class="school-name-sub">4학년 3반</div>
        </div>
      </div>
      <div class="sidebar-divider"></div>
      <nav class="sidebar-nav">
        <div class="nav-label">이번 주 바로가기</div>
        <button class="nav-day" data-day="1">
          <span class="nav-day-icon">💌</span>
          <div class="nav-day-info">
            <span class="nav-day-text">월요일</span>
            <span class="nav-day-sub">선생님 편지</span>
          </div>
        </button>
        <button class="nav-day" data-day="2">
          <span class="nav-day-icon">📖</span>
          <div class="nav-day-info">
            <span class="nav-day-text">화요일</span>
            <span class="nav-day-sub">오늘의 동시</span>
          </div>
        </button>
        <button class="nav-day" data-day="3">
          <span class="nav-day-icon">📚</span>
          <div class="nav-day-info">
            <span class="nav-day-text">수요일</span>
            <span class="nav-day-sub">사자성어</span>
          </div>
        </button>
        <button class="nav-day" data-day="4">
          <span class="nav-day-icon">🎨</span>
          <div class="nav-day-info">
            <span class="nav-day-text">목요일</span>
            <span class="nav-day-sub">명화 이야기</span>
          </div>
        </button>
        <button class="nav-day" data-day="5">
          <span class="nav-day-icon">🔭</span>
          <div class="nav-day-info">
            <span class="nav-day-text">금요일</span>
            <span class="nav-day-sub">오늘의 발견</span>
          </div>
        </button>
        <button class="nav-day" data-day="6">
          <span class="nav-day-icon">☀️</span>
          <div class="nav-day-info">
            <span class="nav-day-text">주말</span>
            <span class="nav-day-sub">쉬어가기</span>
          </div>
        </button>
      </nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-bottom">
        <div id="sidebar-date" class="sidebar-date"></div>
        <div id="sidebar-season" class="sidebar-season-txt"></div>
      </div>
    </aside>
    <div id="main-wrap">
      <header id="header">
        <div class="header-left">
          <div id="date-display"    class="header-date"></div>
          <div id="weekday-display" class="header-weekday"></div>
        </div>
        <div class="header-center">
          <div id="clock" class="clock"></div>
        </div>
        <div class="header-right">
          <div id="season-badge"    class="season-badge"></div>
          <div id="day-theme-badge" class="day-theme-badge"></div>
        </div>
      </header>
      <div id="view-label" class="view-label" style="display:none;"></div>
      <main id="content">
        <div class="loading-screen">
          <div class="loading-orb"></div>
          <p class="loading-text">오늘의 콘텐츠를 준비하고 있어요...</p>
        </div>
      </main>
      <div id="slide-indicator" class="slide-indicator" style="display:none;"></div>
      <footer id="footer">
        <div class="footer-left"><span id="school-name">복산초등학교 4학년 3반</span></div>
        <div class="footer-center">
          <div class="progress-bar-wrap"><div id="progress-bar" class="progress-bar"></div></div>
        </div>
        <div class="footer-right"><span id="slide-counter"></span></div>
      </footer>
    </div>
  </div>
  <script src="js/particles.js"></script>
  <script src="js/monday.js"></script>
  <script src="js/tuesday.js"></script>
  <script src="js/wednesday.js"></script>
  <script src="js/thursday.js"></script>
  <script src="js/friday.js"></script>
  <script src="js/weekend.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
